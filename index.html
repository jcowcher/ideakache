function Clock() {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);
  const d = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()}`;
  const t = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  return <div style={S.clock}>{d} {t}</div>;
}

}

function QuoteCard({ q, isFav, isVer, isRej, onToggleFav, onToggleVer, onToggleRej, onAuthor, onConcept, onVerified, onRejected, onNeedsReview, hlId, isReview }) {
  const ref = useRef(null);
  const lit = hlId === q.id;
  useEffect(() => {
    if (lit && ref.current) {
      ref.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
      ref.current.classList.remove('highlight-anim');
      void ref.current.offsetWidth;
      ref.current.classList.add('highlight-anim');
    }
  }, [lit]);

  const showNote = (q.verified === false || q.verified === 'uncertain') && q.verificationNotes;
  const hasCitation = (q.source && !q.source.startsWith('http')) || q.url;

  return (
    <div ref={ref} id={`q-${q.id}`} style={{ ...S.card, ...(isReview ? S.cardReview : {}), ...(lit ? { borderColor: '#6366f1' } : {}) }}>
      <div style={S.quoteText}>
        <span style={{ color: '#94a3b8', fontSize: 20 }}>{'\u201C'}</span>{q.text}<span style={{ color: '#94a3b8', fontSize: 20 }}>{'\u201D'}</span>
      </div>
      <div style={S.meta}>
        <span style={S.author} onClick={() => onAuthor(q.author)}
          onMouseOver={e => e.target.style.textDecoration='underline'}
          onMouseOut={e => e.target.style.textDecoration='none'}>{q.author}</span>
        <button style={{ ...S.verifiedBadge, color: isVer ? '#22c55e' : '#d1d5db' }}
          onClick={e => { e.stopPropagation(); onToggleVer(q.id); }}
          title={isVer ? 'Verified by JC \u2014 click to unverify' : 'Click to verify'}
          onMouseOver={e => e.currentTarget.style.transform='scale(1.2)'}
          onMouseOut={e => e.currentTarget.style.transform='scale(1)'}>
          {'\u2713'}
        </button>
        <button style={{ ...S.verifiedBadge, color: '#94a3b8' }}
          onClick={e => { e.stopPropagation(); onNeedsReview(); }}
          title="Needs further review"
          onMouseOver={e => e.currentTarget.style.color='#6366f1'}
          onMouseOut={e => e.currentTarget.style.color='#94a3b8'}>
          -
        </button>
        <button style={{ ...S.verifiedBadge, color: isRej ? '#ef4444' : '#d1d5db' }}
          onClick={e => { e.stopPropagation(); onToggleRej(q.id); }}
          title={isRej ? 'Marked for removal \u2014 click to unmark' : 'Mark for removal'}
          onMouseOver={e => e.currentTarget.style.transform='scale(1.2)'}
          onMouseOut={e => e.currentTarget.style.transform='scale(1)'}>
          {'\u2717'}
        </button>
        <button style={S.favBtn} onClick={() => onToggleFav(q.id)}
          title={isFav ? 'Remove from favorites' : 'Save to favorites'}
          onMouseOver={e => e.currentTarget.style.transform='scale(1.2)'}
          onMouseOut={e => e.currentTarget.style.transform='scale(1)'}>
          <BkmkIcon on={isFav} />
        </button>
      </div>
      {hasCitation && (
        q.url ? (
          <a href={q.url} target="_blank" rel="noopener noreferrer" style={S.citationLink}
            onMouseOver={e => e.currentTarget.style.color='#6366f1'}
            onMouseOut={e => e.currentTarget.style.color='#94a3b8'}>
            {q.source || 'Source'}<span style={S.citationArrow}>{'\u2197'}</span>
          </a>
        ) : (
          <span style={S.citationLink}>{q.source}</span>
        )
      )}
      <div style={S.tags}>
        {q.concepts.map(c => (
          <span key={c} style={S.tag} onClick={() => onConcept(c)}
            onMouseOver={e => { e.target.style.background='#6366f1'; e.target.style.color='#fff'; e.target.style.borderColor='#6366f1'; }}
            onMouseOut={e => { e.target.style.background='#f1f5f9'; e.target.style.color='#64748b'; e.target.style.borderColor='#e2e8f0'; }}>
            {c}

    </div>
  );
}

function UserAvatar({ user, onSignOut }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  const initials = user
    ? (user.firstName && user.lastName
        ? (user.firstName[0] + user.lastName[0]).toUpperCase()
        : user.primaryEmailAddress?.emailAddress?.[0]?.toUpperCase() || '?')
    : '?';

  useEffect(() => {
    const handleClick = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handleClick);
    return () => document.removeEventListener('mousedown', handleClick);
  }, []);

  return (
    <div ref={ref} style={{ position: 'relative', display: 'inline-block' }}>
      <button onClick={() => setOpen(o => !o)} style={{
        width: 36, height: 36, borderRadius: '50%', background: '#1c1c1c', color: '#f8f4eb',
        border: 'none', cursor: 'pointer', fontSize: 13, fontWeight: 700, fontFamily: "'Source Serif 4', serif",
        display: 'flex', alignItems: 'center', justifyContent: 'center', letterSpacing: '0.02em',
        transition: 'opacity .15s'
      }} onMouseOver={e => e.currentTarget.style.opacity='0.8'}
         onMouseOut={e => e.currentTarget.style.opacity='1'}>
        {initials}
      </button>
      {open && (
        <div style={{
          position: 'absolute', top: 44, right: 0, background: '#fff', border: '1px solid #e8e0d4',
          borderRadius: 8, boxShadow: '0 4px 16px rgba(0,0,0,0.1)', padding: '4px 0', minWidth: 140, zIndex: 50
        }}>
          <button onClick={() => { setOpen(false); onSignOut(); }} style={{
            width: '100%', padding: '10px 16px', background: 'none', border: 'none', cursor: 'pointer',
            fontSize: 13, color: '#0f172a', fontFamily: "'Source Serif 4', serif", textAlign: 'left',
            transition: 'background .12s'
          }} onMouseOver={e => e.currentTarget.style.background='#f8f4eb'}
             onMouseOut={e => e.currentTarget.style.background='transparent'}>
            Sign out
          </button>
        </div>
      )}
    </div>
  );
}

function App() {
  // --- Auth state (Clerk) ---
  const [user, setUser] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);

  // --- Data state ---
  const [quotes, setQuotes] = useState([]);
  const [dataLoading, setDataLoading] = useState(false);

  // --- App state ---
  const [view, setView] = useState('home');
  const [search, setSearch] = useState('');
  const [filter, setFilter] = useState(null);
  const [favIds, setFavIds] = useState(getFavorites);
  const [verIds, setVerIds] = useState(getVerified);
  const [rejIds, setRejIds] = useState(getRejected);
  const [hlId, setHlId] = useState(null);
  const [landingQuote, setLandingQuote] = useState(() => LANDING_QUOTES[Math.floor(Math.random() * LANDING_QUOTES.length)]);
  const [fadeKey, setFadeKey] = useState(0);

  // --- Auth listener (Clerk) ---
  useEffect(() => {
    const waitForClerk = () => {
      if (window.Clerk && window.Clerk.loaded) {
        setUser(window.Clerk.user ?? null);
        window.Clerk.addListener(({ user: u }) => setUser(u ?? null));
        setAuthLoading(false);
      } else if (window.Clerk && window.Clerk.load) {
        window.Clerk.load().then(() => {
          setUser(window.Clerk.user ?? null);
          window.Clerk.addListener(({ user: u }) => setUser(u ?? null));
          setAuthLoading(false);
        }).catch(() => setAuthLoading(false));
      } else {
        setTimeout(waitForClerk, 100);
      }
    };
    waitForClerk();
  }, []);

  // --- Fetch quotes when authenticated ---
  useEffect(() => {
    if (!user) { setQuotes([]); return; }
    setDataLoading(true);
    supabase.from('quotes').select('*').order('id').then(({ data, error }) => {
      if (error) { console.error('Failed to fetch quotes:', error); setDataLoading(false); return; }
      const transformed = data.map(row => ({
        id: row.id,
        text: row.text,
        author: row.author,
        source: row.source || '',
        url: row.url || '',
        verified: row.verified === 'true' ? true : row.verified === 'false' ? false : row.verified,
        verificationNotes: row.verification_notes || '',
        concepts: row.concepts || [],
        needsReview: row.needs_review || false,
      }));
      setQuotes(transformed);
      setDataLoading(false);
    });
  }, [user]);

  // --- Derived data ---
  const SOURCED = useMemo(() => quotes.filter(q => !q.needsReview), [quotes]);
  const ALL_CONCEPTS = useMemo(() => [...new Set(SOURCED.flatMap(q => q.concepts))].sort(), [SOURCED]);
  const AUTHORS = useMemo(() =>
    Object.entries(
      SOURCED.reduce((m, q) => { m[q.author] = (m[q.author] || 0) + 1; return m; }, {})
    ).sort((a, b) => a[0].localeCompare(b[0])),
  [SOURCED]);

  // --- Auth handlers (Clerk) ---
  const handleSignUp = () => window.Clerk && window.Clerk.openSignUp();
  const handleSignIn = () => window.Clerk && window.Clerk.openSignIn();
  const handleSignOut = async () => {
    if (window.Clerk) await window.Clerk.signOut();
    setView('home');
    setFilter(null);
    setSearch('');
  };

  // --- Landing shuffle ---
  const shuffleQuote = useCallback(() => {
    let next;
    do { next = LANDING_QUOTES[Math.floor(Math.random() * LANDING_QUOTES.length)]; } while (next.text === landingQuote.text && LANDING_QUOTES.length > 1);
    setLandingQuote(next);
    setFadeKey(k => k + 1);
  }, [landingQuote]);

  const toggleFav = useCallback(id => {
    setFavIds(prev => {
      const next = prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id];
      saveFavorites(next);
      return next;
    });
  }, []);

  const logAction = (action, id) => {
    try {
      const log = JSON.parse(localStorage.getItem('ik_ver_log') || '[]');
      const q = quotes.find(q => q.id === id);
      log.push({
        action,
        id,
        author: q ? q.author : '',
        text: q ? q.text.slice(0, 80) : '',
        timestamp: new Date().toISOString()
      });
      localStorage.setItem('ik_ver_log', JSON.stringify(log));
    } catch {}
  };

  const toggleVer = useCallback(id => {
    const current = getVerified();
    const adding = !current.includes(id);
    const next = adding ? [...current, id] : current.filter(x => x !== id);
    saveVerified(next);
    setVerIds(next);
    logAction(adding ? 'verified' : 'unverified', id);
  }, [quotes]);

  const toggleRej = useCallback(id => {
    const current = getRejected();
    const adding = !current.includes(id);
    const next = adding ? [...current, id] : current.filter(x => x !== id);
    saveRejected(next);
    setRejIds(next);
    logAction(adding ? 'rejected' : 'unrejected', id);
  }, [quotes]);

  const pool = SOURCED;

  const filtered = useMemo(() => {
    if (view === 'surprise') return SOURCED.filter(q => q.id === hlId);
    let list = pool;
    if (view === 'favorites') list = quotes.filter(q => favIds.includes(q.id));
    if (filter) {
      if (filter.type === 'author') list = list.filter(q => q.author === filter.value);
      else if (filter.type === 'verified') list = list.filter(q => verIds.includes(q.id));
      else if (filter.type === 'rejected') list = list.filter(q => rejIds.includes(q.id));
      else if (filter.type === 'needsReview') list = list.filter(q => !verIds.includes(q.id) && !rejIds.includes(q.id));
      else list = list.filter(q => q.concepts.includes(filter.value));
    }
    if (search && search.trim() !== '*') {
      const terms = search.toLowerCase().split(/\s+/);
      list = list.filter(q => { const h = (q.text + ' ' + q.author).toLowerCase(); return terms.every(t => h.includes(t)); });
    }
    return list;
  }, [view, filter, search, favIds, verIds, rejIds, pool, hlId, quotes]);

  const handleSurprise = () => {
    const pick = SOURCED[Math.floor(Math.random() * SOURCED.length)];
    setFilter(null);
    setSearch('');
    setView('surprise');
    setHlId(pick.id);
  };

  const setAuthorF = a => { setFilter({ type: 'author', value: a }); setView('list'); };
  const setConceptF = c => { setFilter({ type: 'concept', value: c }); setView('list'); };
  const setVerifiedF = () => { setFilter({ type: 'verified', value: 'Verified by JC' }); setView('list'); };
  const setRejectedF = () => { setFilter({ type: 'rejected', value: 'Marked for removal' }); setView('list'); };
  const setNeedsReviewF = () => { setFilter({ type: 'needsReview', value: 'Needs further review' }); setView('list'); };
  const clearF = () => { setFilter(null); setView('home'); };
  const goHome = () => { setView('home'); setFilter(null); setSearch(''); setHlId(null); };
  const switchView = v => { setView(v); setFilter(null); setHlId(null); };

  const isListView = ['list', 'favorites', 'surprise'].includes(view);

  if (authLoading) return <div style={S.loadingWrap}>Loading...</div>;

  if (!user) {
    return (
      <div style={S.notebook}>
        <div style={{position: 'absolute', top: 24, left: 0, right: 0, color: '#94a3b8'}}><Clock /></div>
        <div style={S.notebookFrame}>
          <div style={S.notebookSpine} />
          <div style={S.notebookLines} />
          <div key={fadeKey} style={{...S.notebookQuote, position: 'relative', zIndex: 1}}>
            {"\u201C"}{landingQuote.text}{"\u201D"}
          </div>
          <div key={'a' + fadeKey} style={{...S.notebookAuthor, animation: 'notebookFadeIn 0.8s ease-out 0.1s both', position: 'relative', zIndex: 1}}>
            {"\u2014"} {landingQuote.author}
          </div>
        </div>
        <button style={S.notebookShuffle} onClick={shuffleQuote} title="Another quote"
          onMouseOver={e => { e.currentTarget.style.borderColor='#8b7355'; e.currentTarget.style.color='#2c1810'; }}
          onMouseOut={e => { e.currentTarget.style.borderColor='#d4c4a8'; e.currentTarget.style.color='#8b7355'; }}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/>
            <path d="M2.5 11.5a10 10 0 0 1 18.4-4.5"/><path d="M21.5 12.5a10 10 0 0 1-18.4 4.5"/>
          </svg>
        </button>
        {/* Auth buttons */}
        <div style={S.authBtnRow}>
          <button style={S.authBtnOutline} onClick={handleSignUp}
            onMouseOver={e => { e.currentTarget.style.background='#1c1c1c'; e.currentTarget.style.color='#f8f4eb'; }}
            onMouseOut={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='#1c1c1c'; }}>
            Sign up
          </button>
          <button style={S.authBtnFilled} onClick={handleSignIn}
            onMouseOver={e => e.currentTarget.style.background='#333'}
            onMouseOut={e => e.currentTarget.style.background='#1c1c1c'}>
            Log in
          </button>
        </div>
        <div style={{textAlign: 'center', marginTop: 32}}>
          <div style={{fontFamily: "'Source Serif 4', serif", fontSize: 14, color: '#b8a88a', letterSpacing: '0.12em', fontWeight: 600}}>IDEAKACHE</div>
          <div style={{fontSize: 12, color: '#b8a88a', marginTop: 4, fontStyle: 'italic', fontFamily: "'Source Serif 4', serif"}}>Ideas, concepts and quotes curated by Jeremy Cowcher</div>
        </div>
      </div>
    );
  }

  if (dataLoading) return <div style={S.loadingWrap}>Loading quotes...</div>;

  return (
    <div style={S.page}>
      {view !== 'home' && <nav style={S.nav}>
        <div style={S.navInner}>
          <div style={S.navCenter}><Clock /></div>
          <div style={S.navRow}>
            <div style={S.navLeft}>
              <button style={{ ...S.navLink, ...(view === 'authors' ? S.navLinkActive : {}) }}
                onClick={() => switchView('authors')}
                onMouseOver={e => { if (view !== 'authors') e.currentTarget.style.background='#f1f5f9'; }}
                onMouseOut={e => { if (view !== 'authors') e.currentTarget.style.background='transparent'; }}>Authors</button>
              <button style={{ ...S.navLink, ...(view === 'concepts' ? S.navLinkActive : {}) }}
                onClick={() => switchView('concepts')}
                onMouseOver={e => { if (view !== 'concepts') e.currentTarget.style.background='#f1f5f9'; }}
                onMouseOut={e => { if (view !== 'concepts') e.currentTarget.style.background='transparent'; }}>Concepts</button>
              <button style={{ ...S.navLink, ...(view === 'favorites' ? S.navLinkActive : {}) }}
                onClick={() => switchView('favorites')}
                onMouseOver={e => { if (view !== 'favorites') e.currentTarget.style.background='#f1f5f9'; }}
                onMouseOut={e => { if (view !== 'favorites') e.currentTarget.style.background='transparent'; }}>
                Favorites{favIds.length ? ` (${favIds.length})` : ''}</button>
              <button style={{ ...S.surpriseBtn, ...(view === 'surprise' ? S.navLinkActive : {}) }}
                onClick={handleSurprise}
                onMouseOver={e => { if (view !== 'surprise') e.currentTarget.style.background='#f1f5f9'; }}
                onMouseOut={e => { if (view !== 'surprise') e.currentTarget.style.background='transparent'; }}>Kache Surprise</button>
            </div>
            <div style={S.navRight}>
              <div style={S.ikBadge} onClick={goHome} title="Home">IdeaKache</div>
              <UserAvatar user={user} onSignOut={handleSignOut} />
            </div>
          </div>
        </div>
      </nav>}

      {view === 'home' && (
        <div style={{ textAlign: 'center', padding: '80px 24px 40px', maxWidth: 700, margin: '0 auto', position: 'relative' }}>
          <div style={{ position: 'absolute', top: 24, right: 24 }}>
            <UserAvatar user={user} onSignOut={handleSignOut} />
          </div>
          <h1 style={{ fontFamily: "'Libre Baskerville', Georgia, serif", fontStyle: 'italic', fontSize: 'clamp(26px, 4.5vw, 38px)', fontWeight: 400, color: '#8b7355', marginBottom: 32, lineHeight: 1.4 }}>
            What will you explore today?
          </h1>
          <div style={{ ...S.searchWrap, maxWidth: 560, margin: '0 auto 40px' }}>
            <svg style={S.searchIcon} width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input style={{ ...S.search, padding: '14px 14px 14px 42px', fontSize: 15, borderRadius: 12, border: '1.5px solid #e8e0d4', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}
              placeholder="Search quotes and authors..."
              value={search}
              onChange={e => { setSearch(e.target.value); if (e.target.value) setView('list'); }}
              onFocus={e => { e.target.style.borderColor='#6366f1'; e.target.style.boxShadow='0 2px 16px rgba(99,102,241,0.15)'; }}
              onBlur={e => { e.target.style.borderColor='#e8e0d4'; e.target.style.boxShadow='0 2px 12px rgba(0,0,0,0.06)'; }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 12, flexWrap: 'wrap', marginBottom: 48 }}>
            <button style={{ ...S.navLink, border: '1px solid #e8e0d4', borderRadius: 20, background: '#f8f4eb' }}
              onClick={() => switchView('authors')}
              onMouseOver={e => { e.currentTarget.style.borderColor='#6366f1'; e.currentTarget.style.color='#6366f1'; }}
              onMouseOut={e => { e.currentTarget.style.borderColor='#e8e0d4'; e.currentTarget.style.color='#64748b'; }}>
              Authors
            </button>
            <button style={{ ...S.navLink, border: '1px solid #e8e0d4', borderRadius: 20, background: '#f8f4eb' }}
              onClick={() => switchView('concepts')}
              onMouseOver={e => { e.currentTarget.style.borderColor='#6366f1'; e.currentTarget.style.color='#6366f1'; }}
              onMouseOut={e => { e.currentTarget.style.borderColor='#e8e0d4'; e.currentTarget.style.color='#64748b'; }}>
              Concepts
            </button>
          </div>
          <div style={{ borderTop: '1px solid #e8e0d4', paddingTop: 32 }}>
            <div key={fadeKey} style={{ ...S.notebookQuote, fontSize: 'clamp(16px, 2.5vw, 20px)', maxWidth: 500, margin: '0 auto', animation: 'notebookFadeIn 0.8s ease-out' }}>
              {"\u201C"}{landingQuote.text}{"\u201D"}
            </div>
            <div key={'a' + fadeKey} style={{ ...S.notebookAuthor, animation: 'notebookFadeIn 0.8s ease-out 0.1s both' }}>
              {"\u2014"} {landingQuote.author}
            </div>
            <button style={{ ...S.notebookShuffle, margin: '20px auto 0' }} onClick={shuffleQuote} title="Another quote"
              onMouseOver={e => { e.currentTarget.style.borderColor='#8b7355'; e.currentTarget.style.color='#2c1810'; }}
              onMouseOut={e => { e.currentTarget.style.borderColor='#d4c4a8'; e.currentTarget.style.color='#8b7355'; }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M21.5 2v6h-6"/><path d="M2.5 22v-6h6"/>
                <path d="M2.5 11.5a10 10 0 0 1 18.4-4.5"/><path d="M21.5 12.5a10 10 0 0 1-18.4 4.5"/>
              </svg>
            </button>
          </div>
        </div>
      )}

      {view !== 'home' && (
        <main style={S.main}>
          {(view === 'list' || !isListView) && (
            <div style={{ ...S.searchWrap, maxWidth: '100%', marginBottom: 20 }}>
              <svg style={S.searchIcon} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input style={S.search} placeholder="Search quotes and authors..." value={search}
                onChange={e => { setSearch(e.target.value); if (e.target.value) setView('list'); }}
                onFocus={e => e.target.style.borderColor='#6366f1'}
                onBlur={e => e.target.style.borderColor='#e8e0d4'} />
            </div>
          )}

          {filter && (
            <div style={S.filterBar}>
              <div style={S.pill}>
                {filter.type === 'verified' || filter.type === 'needsReview' || filter.type === 'rejected' ? filter.value : `${filter.type === 'author' ? 'Author' : 'Concept'}: ${filter.value}`}
                <button style={S.pillX} onClick={clearF}>&times;</button>
              </div>
              <span style={S.count}>{filtered.length} quote{filtered.length !== 1 ? 's' : ''}</span>
            </div>
          )}

          {isListView && (
            filtered.length === 0
              ? <div style={S.empty}>
                  {view === 'favorites' ? 'No favorites yet. Bookmark quotes to save them here.'
                    : view === 'surprise' ? 'Hit Kache Surprise to discover a quote.'
                    : 'No quotes match your search.'}
                </div>
              : <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  {view !== 'surprise' && !filter && !search && <div style={S.count}>{filtered.length} quotes</div>}
                  {filtered.map(q => (
                    <QuoteCard key={q.id} q={q} isFav={favIds.includes(q.id)}
                      onToggleFav={toggleFav} isVer={verIds.includes(q.id)} onToggleVer={toggleVer}
                      isRej={rejIds.includes(q.id)} onToggleRej={toggleRej}
                      onAuthor={setAuthorF} onConcept={setConceptF} onVerified={setVerifiedF} onRejected={setRejectedF} onNeedsReview={setNeedsReviewF} hlId={hlId}
                      isReview={q.needsReview} />
                  ))}
                  {view === 'surprise' && <div style={{ textAlign: 'center', marginTop: 8 }}>
                    <button style={S.btn} onClick={handleSurprise}
                      onMouseOver={e => e.currentTarget.style.background='#4f46e5'}
                      onMouseOut={e => e.currentTarget.style.background='#6366f1'}>Another one</button>
                  </div>}
                </div>
          )}

          {view === 'authors' && (
            <div style={S.grid}>
              {AUTHORS.map(([name, count]) => (
                <div key={name} style={S.browseItem} onClick={() => setAuthorF(name)}
                  onMouseOver={e => { e.currentTarget.style.borderColor='#6366f1'; e.currentTarget.style.background='#eef2ff'; }}
                  onMouseOut={e => { e.currentTarget.style.borderColor='#e8e0d4'; e.currentTarget.style.background='#f8f4eb'; }}>
                  <span style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginRight: 8 }}>{name}</span>
                  <span style={S.browseCount}>{count}</span>
                </div>
              ))}
            </div>
          )}

          {view === 'concepts' && (
            <div style={S.grid}>
              {ALL_CONCEPTS.map(c => {
                const n = SOURCED.filter(q => q.concepts.includes(c)).length;
                return (
                  <div key={c} style={S.browseItem} onClick={() => setConceptF(c)}
                    onMouseOver={e => { e.currentTarget.style.borderColor='#6366f1'; e.currentTarget.style.background='#eef2ff'; }}
                    onMouseOut={e => { e.currentTarget.style.borderColor='#e8e0d4'; e.currentTarget.style.background='#f8f4eb'; }}>
                    <span style={{ fontWeight: 500 }}>{c}</span>
                    <span style={S.browseCount}>{n}</span>
                  </div>
                );
              })}
            </div>
          )}
        </main>
      )}

      <footer style={S.footer}>
        <a href="https://ideakache.com" style={{ color: '#6366f1', textDecoration: 'none', fontWeight: 500 }} onClick={e => { e.preventDefault(); goHome(); }}>ideakache.com</a>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
